<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Vigilantes</title>
  <style>
    body { font-family: Arial; margin:20px; }
    input, select, button { margin:5px 0; padding:5px; }
    table, th, td { border:1px solid #000; border-collapse: collapse; padding:5px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <h1>Sistema de Vigilantes</h1>

  <!-- Login -->
  <form id="login-form">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Senha" required><br>
    <button type="submit">Entrar</button>
  </form>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <h2>Bem-vindo, <span id="user-name"></span></h2>
    <button id="logout">Sair</button>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden">
      <h3>Cadastrar Novo Usuário</h3>
      <form id="register-user-form">
        <input type="email" id="new-email" placeholder="Email" required><br>
        <input type="password" id="new-password" placeholder="Senha" required><br>
        <select id="new-role" required>
          <option value="" disabled selected>Role</option>
          <option value="admin">Administrador</option>
          <option value="viewer">Visualizador</option>
        </select><br>
        <button type="submit">Cadastrar Usuário</button>
      </form>

      <h3>Adicionar Vigilante</h3>
      <form id="add-vigilante-form">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="funcao" placeholder="Função" required>
        <input type="text" id="turno" placeholder="Turno" required>
        <button type="submit">Adicionar Vigilante</button>
      </form>
    </div>

    <!-- Viewer Panel -->
    <h3>Lista de Vigilantes</h3>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Função</th>
          <th>Turno</th>
          <th id="acoes-col" class="hidden">Ações</th>
        </tr>
      </thead>
      <tbody id="vigilantes-list"></tbody>
    </table>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const dashboard = document.getElementById("dashboard");
    const userName = document.getElementById("user-name");
    const adminPanel = document.getElementById("admin-panel");
    const vigilantesList = document.getElementById("vigilantes-list");
    const acoesCol = document.getElementById("acoes-col");
    const registerForm = document.getElementById("register-user-form");
    const addForm = document.getElementById("add-vigilante-form");

    let currentRole = "";

    // Login simulado usando Admin SDK via backend
    loginForm.addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      // 🔹 Aqui você chamaria um endpoint que verifica login
      // Para simplificar, vamos assumir que login é válido
      // e buscar role do usuário pelo Firestore via backend
      try {
        // Simulação:
        const res = await fetch(`http://localhost:3000/users?email=${email}`);
        const data = await res.json(); // { email, role }
        currentRole = data.role || "viewer";

        loginForm.classList.add("hidden");
        dashboard.classList.remove("hidden");
        userName.textContent = email;

        if(currentRole === "admin") adminPanel.classList.remove("hidden");
        loadVigilantes();
      } catch(err) {
        alert("Erro ao logar: " + err);
      }
    });

    // Cadastrar usuário (admin)
    registerForm.addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("new-email").value.trim();
      const password = document.getElementById("new-password").value.trim();
      const role = document.getElementById("new-role").value;

      try {
        const res = await fetch("http://localhost:3000/create-user", {
          method:"POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();
        alert(data.success ? "Usuário cadastrado!" : data.error);
        registerForm.reset();
      } catch(err) {
        alert("Erro: " + err);
      }
    });

    // Adicionar vigilante
    addForm.addEventListener("submit", async e => {
      e.preventDefault();
      const nome = document.getElementById("nome").value;
      const funcao = document.getElementById("funcao").value;
      const turno = document.getElementById("turno").value;

      await fetch("http://localhost:3000/vigilantes", {
        method:"POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, funcao, turno })
      });
      addForm.reset();
      loadVigilantes();
    });

    // Carregar vigilantes
    async function loadVigilantes(){
      const res = await fetch("http://localhost:3000/vigilantes");
      const vigilantes = await res.json();
      vigilantesList.innerHTML = "";
      vigilantes.forEach(v => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${v.nome}</td>
          <td>${v.funcao}</td>
          <td>${v.turno}</td>
          <td>${currentRole==="admin"?`<button onclick="edit('${v.id}')">Editar</button> <button onclick="del('${v.id}')">Excluir</button>`:""}</td>
        `;
        vigilantesList.appendChild(tr);
      });
    }

    window.edit = async (id) => {
      const nome = prompt("Nome:");
      const funcao = prompt("Função:");
      const turno = prompt("Turno:");
      if(nome && funcao && turno){
        await fetch(`http://localhost:3000/vigilantes/${id}`, {
          method:"PUT",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ nome, funcao, turno })
        });
        loadVigilantes();
      }
    }

    window.del = async (id) => {
      if(confirm("Deseja excluir?")){
        await fetch(`http://localhost:3000/vigilantes/${id}`, { method:"DELETE" });
        loadVigilantes();
      }
    }
  </script>
</body>
</html>
