<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login Vigilantes</title>
</head>
<body>
  <h1>Login</h1>
  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Senha" required><br>
    <button type="submit">Entrar</button>
  </form>

  <script type="module">
    // 1️⃣ Importar Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

    // 2️⃣ Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBAARdjzSUNEjs9_fSiDtnXu9LzOnVpLzQ",
      authDomain: "controle-vigilantes.firebaseapp.com",
      projectId: "controle-vigilantes",
      storageBucket: "controle-vigilantes.firebasestorage.app",
      messagingSenderId: "97498390450",
      appId: "1:97498390450:web:6867a8e74dc40787ab8eab",
      measurementId: "G-MBPQXNVPDK"
    };

    // 3️⃣ Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    // 4️⃣ Capturar formulário
    const loginForm = document.getElementById("login-form");

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault(); // Evita reload da página

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      // 5️⃣ Login com email e senha
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          alert(`Bem-vindo, ${user.email}!`);
          console.log("Usuário logado:", user);
        })
        .catch((error) => {
          console.error("Erro no login:", error.code, error.message);
          alert(`Erro: ${error.message}`);
        });
    });
  </script>
</body>
</html>
